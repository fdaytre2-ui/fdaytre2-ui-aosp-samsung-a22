name: AOSP A22 ARM64 Clean Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk & Add Swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 lib32ncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo

      - name: Sync AOSP
        run: |
          mkdir aosp_13 && cd aosp_13
          repo init -u https://android.googlesource.com/platform/manifest -b android-13.0.0_r1 --depth=1
          repo sync -c -j$(nproc) --force-sync

      - name: Setup Device Tree
        run: |
          DT="aosp_13/device/samsung/a22"
          mkdir -p $DT
          # BoardConfig - إجبار ARM64
          printf 'TARGET_ARCH := arm64\nTARGET_ARCH_VARIANT := armv8-a\nTARGET_CPU_ABI := arm64-v8a\nTARGET_BOARD_PLATFORM := generic_arm64\n' > $DT/BoardConfig.mk
          # Makefiles
          printf 'PRODUCT_NAME := a22\nPRODUCT_DEVICE := generic_arm64\nPRODUCT_BRAND := samsung\nPRODUCT_MODEL := SM-A225F\nPRODUCT_MANUFACTURER := samsung\n' > $DT/a22.mk
          printf 'include $(SRC_TARGET_DIR)/product/aosp_arm64.mk\n' >> $DT/a22.mk
          printf 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/a22.mk\n' > $DT/AndroidProducts.mk
          printf 'add_lunch_combo a22-user\n' > $DT/vendorsetup.sh

      - name: Build System (User Build)
        run: |
          cd aosp_13
          source build/envsetup.sh
          # اختيار نسخة الـ user (بدون روت نهائياً)
          lunch a22-user
          # استخدام -j2 لتقليل الضغط على الرامات
          m -j2 systemimage
