name: AOSP A22 Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo

      - name: Sync AOSP
        run: |
          (while true; do echo "[$(date '+%H:%M:%S')] alive..."; sleep 120; done) &
          git config --global user.name "Moktar"
          git config --global user.email "moktar@example.com"
          WORK_DIR="$GITHUB_WORKSPACE/aosp_13"
          mkdir -p $WORK_DIR && cd $WORK_DIR
          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-13.0.0_r1 --depth=1 --no-repo-verify
          repo sync -c -j4 --no-tags --no-clone-bundle --force-sync --no-manifest-update || true
          df -h .

      - name: Clean Problematic Modules
        run: |
          WORK_DIR="$GITHUB_WORKSPACE/aosp_13"
          cd $WORK_DIR

          echo "=== Removing known problematic dirs ==="
          rm -rf \
            external/chromium-webview \
            external/noto-fonts \
            cts \
            test \
            kernel/tests \
            tools/treble \
            tools/trebuchet \
            art/test \
            art/compiler/tests \
            2>/dev/null || true

          echo "=== Removing csuite_test references ==="
          grep -r "csuite_test" --include="*.bp" -l 2>/dev/null | while read f; do
            dir=$(dirname "$f")
            echo "Removing dir: $dir"
            rm -rf "$dir"
          done || true

          echo "=== Removing art_gtest_defaults references ==="
          grep -r "art_gtest_defaults" --include="*.bp" -l 2>/dev/null | while read f; do
            echo "Patching: $f"
            sed -i '/art_gtest_defaults/d' "$f"
            sed -i '/art_compiler_host_tests/d' "$f"
          done || true

          echo "=== Disk after clean ==="
          df -h .

      - name: Write Device Tree
        run: |
          DT="$GITHUB_WORKSPACE/aosp_13/device/samsung/a22"
          mkdir -p $DT
          printf 'TARGET_ARCH := x86_64\n' > $DT/BoardConfig.mk
          printf 'TARGET_ARCH_VARIANT := x86_64\n' >> $DT/BoardConfig.mk
          printf 'TARGET_CPU_ABI := x86_64\n' >> $DT/BoardConfig.mk
          printf 'TARGET_CPU_ABI2 :=\n' >> $DT/BoardConfig.mk
          printf 'TARGET_CPU_VARIANT := x86_64\n' >> $DT/BoardConfig.mk
          printf 'TARGET_2ND_ARCH := x86\n' >> $DT/BoardConfig.mk
          printf 'TARGET_2ND_ARCH_VARIANT := x86_64\n' >> $DT/BoardConfig.mk
          printf 'TARGET_2ND_CPU_ABI := x86\n' >> $DT/BoardConfig.mk
          printf 'TARGET_2ND_CPU_ABI2 :=\n' >> $DT/BoardConfig.mk
          printf 'TARGET_2ND_CPU_VARIANT := generic\n' >> $DT/BoardConfig.mk
          printf 'TARGET_BOARD_PLATFORM := mt6769t\n' >> $DT/BoardConfig.mk
          printf 'TARGET_BOOTLOADER_BOARD_NAME := a22\n' >> $DT/BoardConfig.mk
          printf 'BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472\n' >> $DT/BoardConfig.mk
          printf 'BOARD_USERDATAIMAGE_PARTITION_SIZE := 2147483648\n' >> $DT/BoardConfig.mk
          printf 'BOARD_CACHEIMAGE_PARTITION_SIZE := 268435456\n' >> $DT/BoardConfig.mk
          printf 'BOARD_CACHEIMAGE_FILE_SYSTEM_TYPE := ext4\n' >> $DT/BoardConfig.mk
          printf 'TARGET_USERIMAGES_USE_EXT4 := true\n' >> $DT/BoardConfig.mk
          printf 'BOARD_AVB_ENABLE := false\n' >> $DT/BoardConfig.mk
          printf 'BOARD_DEBUGFS_RESTRICTIONS := true\n' >> $DT/BoardConfig.mk
          printf 'BUILD_BROKEN_DUP_RULES := true\n' >> $DT/BoardConfig.mk
          printf 'BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true\n' >> $DT/BoardConfig.mk
          printf 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/a22.mk\nCOMMON_LUNCH_CHOICES := a22-userdebug\n' > $DT/AndroidProducts.mk
          printf 'add_lunch_combo a22-userdebug\n' > $DT/vendorsetup.sh
          printf '$(call inherit-product, $(SRC_TARGET_DIR)/product/sdk_phone_x86_64.mk)\n' > $DT/a22.mk
          printf 'PRODUCT_NAME := a22\n' >> $DT/a22.mk
          printf 'PRODUCT_DEVICE := a22\n' >> $DT/a22.mk
          printf 'PRODUCT_BRAND := samsung\n' >> $DT/a22.mk
          printf 'PRODUCT_MODEL := SM-A225F\n' >> $DT/a22.mk
          printf 'PRODUCT_MANUFACTURER := samsung\n' >> $DT/a22.mk
          echo "=== Device Tree Ready ==="
          cat $DT/BoardConfig.mk

      - name: Build AOSP
        run: |
          WORK_DIR="$GITHUB_WORKSPACE/aosp_13"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          OUTPUT="$GITHUB_WORKSPACE/output"
          CCACHE_DIR="$GITHUB_WORKSPACE/ccache"
          mkdir -p $OUT_DIR $OUTPUT $CCACHE_DIR
          cd $WORK_DIR
          export OUT_DIR=$OUT_DIR
          export USE_CCACHE=1
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 10G
          source build/envsetup.sh && lunch a22-userdebug && \
            m -j2 systemimage 2>&1 | tee $OUTPUT/build_log.txt || true
          for img in system.img ramdisk.img vendor.img userdata.img; do
            src="$OUT_DIR/target/product/a22/$img"
            [ -f "$src" ] && cp -v $src $OUTPUT/ && echo "OK: $img" || echo "NOT FOUND: $img"
          done
          ls -lh $OUTPUT/
          echo "=== DONE ==="

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aosp-a22-output
          path: ${{ github.workspace }}/output/
          retention-days: 7

      - name: tmate SSH Session
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
