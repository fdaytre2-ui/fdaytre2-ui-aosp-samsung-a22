name: AOSP A22 Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses5-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo

      - name: Setup and Build AOSP
        run: |
          git config --global user.name "Moktar"
          git config --global user.email "moktar@example.com"

          (while true; do echo "[$(date '+%H:%M:%S')] Keep alive..."; sleep 120; done) &

          WORK_DIR="$GITHUB_WORKSPACE/aosp_13"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          OUTPUT="$GITHUB_WORKSPACE/output"
          CCACHE_DIR="$GITHUB_WORKSPACE/ccache"

          mkdir -p $WORK_DIR $OUT_DIR $OUTPUT $CCACHE_DIR
          cd $WORK_DIR

          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-13.0.0_r1 --depth=1 --no-repo-verify

          repo sync -c -j4 --no-tags --no-clone-bundle --force-sync --no-manifest-update || true

          rm -rf external/chromium-webview external/noto-fonts \
            cts test kernel/tests tools/treble tools/trebuchet 2>/dev/null || true

          echo "Cleanup done"
          df -h

          mkdir -p device/samsung/a22

          python3 - << 'PYEOF'
          import os
          dt = "device/samsung/a22"

          open(f"{dt}/BoardConfig.mk","w").write(
          "TARGET_ARCH := x86_64\n"
          "TARGET_ARCH_VARIANT := x86_64\n"
          "TARGET_CPU_ABI := x86_64\n"
          "TARGET_CPU_ABI2 :=\n"
          "TARGET_CPU_VARIANT := x86_64\n"
          "TARGET_2ND_ARCH := x86\n"
          "TARGET_2ND_ARCH_VARIANT := x86_64\n"
          "TARGET_2ND_CPU_ABI := x86\n"
          "TARGET_2ND_CPU_ABI2 :=\n"
          "TARGET_2ND_CPU_VARIANT := x86_64\n"
          "TARGET_BOARD_PLATFORM := mt6769t\n"
          "TARGET_BOOTLOADER_BOARD_NAME := a22\n"
          "BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472\n"
          "BOARD_USERDATAIMAGE_PARTITION_SIZE := 2147483648\n"
          "BOARD_CACHEIMAGE_PARTITION_SIZE := 268435456\n"
          "BOARD_CACHEIMAGE_FILE_SYSTEM_TYPE := ext4\n"
          "TARGET_USERIMAGES_USE_EXT4 := true\n"
          "BOARD_AVB_ENABLE := false\n"
          "BOARD_DEBUGFS_RESTRICTIONS := true\n"
          "BUILD_BROKEN_DUP_RULES := true\n"
          "BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true\n"
          )

          open(f"{dt}/AndroidProducts.mk","w").write(
          "PRODUCT_MAKEFILES := $(LOCAL_DIR)/a22.mk\n"
          "COMMON_LUNCH_CHOICES := a22-userdebug\n"
          )

          open(f"{dt}/vendorsetup.sh","w").write(
          "add_lunch_combo a22-userdebug\n"
          )

          open(f"{dt}/a22.mk","w").write(
          "$(call inherit-product, $(SRC_TARGET_DIR)/product/sdk_phone_x86_64.mk)\n"
          "PRODUCT_NAME := a22\n"
          "PRODUCT_DEVICE := a22\n"
          "PRODUCT_BRAND := samsung\n"
          "PRODUCT_MODEL := SM-A225F\n"
          "PRODUCT_MANUFACTURER := samsung\n"
          "PRODUCT_SYSTEM_PROPERTIES += \\\n"
          "    ro.product.model=SM-A225F \\\n"
          "    ro.product.brand=samsung \\\n"
          "    ro.hardware=mt6769t \\\n"
          "    ro.kernel.qemu=0 \\\n"
          "    ro.secure=1 \\\n"
          "    ro.debuggable=0 \\\n"
          "    ro.build.version.release=13 \\\n"
          "    ro.build.version.sdk=33\n"
          )

          print("Device Tree Ready!")
          PYEOF

          export OUT_DIR=$OUT_DIR
          export USE_CCACHE=1
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 10G

          source build/envsetup.sh && lunch a22-userdebug && \
            m -j2 systemimage 2>&1 | tee $OUTPUT/build_log.txt || true

          for img in system.img ramdisk.img vendor.img userdata.img; do
            src="$OUT_DIR/target/product/a22/$img"
            if [ -f "$src" ]; then
              cp -v $src $OUTPUT/
              echo "OK $img"
            else
              echo "NOT FOUND $img"
            fi
          done

          ls -lh $OUTPUT/
          echo "DONE!"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aosp-a22-output
          path: ${{ github.workspace }}/output/
          retention-days: 7

      - name: tmate SSH Session
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
