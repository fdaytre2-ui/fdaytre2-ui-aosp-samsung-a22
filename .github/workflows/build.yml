name: AOSP A22 Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo

      - name: Setup SSH
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "ssh-rsa  mokhtar-pc@Mokhtar" > /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
          mkdir -p /home/runner/.ssh
          chmod 700 /home/runner/.ssh
          cp /root/.ssh/authorized_keys /home/runner/.ssh/authorized_keys
          chmod 600 /home/runner/.ssh/authorized_keys
          echo "SSH key added!"
          cat /home/runner/.ssh/authorized_keys

      - name: tmate SSH Session
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
