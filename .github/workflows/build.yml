name: AOSP A22 Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses5-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo

      - name: Setup and Build AOSP
        run: |
          git config --global user.name "Moktar"
          git config --global user.email "moktar@example.com"

          (while true; do echo "[$(date '+%H:%M:%S')] Keep alive..."; sleep 120; done) &

          # على GitHub Actions نستخدم $GITHUB_WORKSPACE مش /tmp
          WORK_DIR="$GITHUB_WORKSPACE/aosp_13"
          OUT_DIR="$GITHUB_WORKSPACE/out"
          OUTPUT="$GITHUB_WORKSPACE/output"
          CCACHE_DIR="$GITHUB_WORKSPACE/ccache"

          mkdir -p $WORK_DIR $OUT_DIR $OUTPUT $CCACHE_DIR
          cd $WORK_DIR

          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-13.0.0_r1 --depth=1 --no-repo-verify

          repo sync -c -j4 --no-tags --no-clone-bundle --force-sync --no-manifest-update || true

          # حذف الملفات الكبيرة
          rm -rf external/chromium-webview external/noto-fonts \
            cts test kernel/tests tools/treble tools/trebuchet 2>/dev/null || true

          echo "🗑️ Cleanup done"
          df -h

          # Device Tree
          mkdir -p device/samsung/a22

          cat > device/samsung/a22/BoardConfig.mk << 'EOL'
TARGET_ARCH := x86_64
TARGET_ARCH_VARIANT := x86_64
TARGET_CPU_ABI := x86_64
TARGET_CPU_ABI2 :=
TARGET_CPU_VARIANT := x86_64
TARGET_2ND_ARCH := x86
TARGET_2ND_ARCH_VARIANT := x86_64
TARGET_2ND_CPU_ABI := x86
TARGET_2ND_CPU_ABI2 :=
TARGET_2ND_CPU_VARIANT := x86_64
TARGET_BOARD_PLATFORM := mt6769t
TARGET_BOOTLOADER_BOARD_NAME := a22
BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472
BOARD_USERDATAIMAGE_PARTITION_SIZE := 2147483648
BOARD_CACHEIMAGE_PARTITION_SIZE := 268435456
BOARD_CACHEIMAGE_FILE_SYSTEM_TYPE := ext4
TARGET_USERIMAGES_USE_EXT4 := true
BOARD_AVB_ENABLE := false
BOARD_DEBUGFS_RESTRICTIONS := true
BUILD_BROKEN_DUP_RULES := true
BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true
EOL

          cat > device/samsung/a22/AndroidProducts.mk << 'EOL'
PRODUCT_MAKEFILES := $(LOCAL_DIR)/a22.mk
COMMON_LUNCH_CHOICES := a22-userdebug
EOL

          cat > device/samsung/a22/vendorsetup.sh << 'EOL'
add_lunch_combo a22-userdebug
EOL

          cat > device/samsung/a22/a22.mk << 'EOL'
$(call inherit-product, $(SRC_TARGET_DIR)/product/sdk_phone_x86_64.mk)
PRODUCT_NAME := a22
PRODUCT_DEVICE := a22
PRODUCT_BRAND := samsung
PRODUCT_MODEL := SM-A225F
PRODUCT_MANUFACTURER := samsung
PRODUCT_SYSTEM_PROPERTIES += \
    ro.product.model=SM-A225F \
    ro.product.brand=samsung \
    ro.hardware=mt6769t \
    ro.kernel.qemu=0 \
    ro.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
    ro.secure=1 \
    ro.debuggable=0 \
    ro.build.version.release=13 \
    ro.build.version.sdk=33 \
    ro.build.version.security_patch=2026-03-05
EOL

          echo "✅ Device Tree Ready!"

          # Build
          export OUT_DIR=$OUT_DIR
          export USE_CCACHE=1
          export CCACHE_DIR=$CCACHE_DIR
          ccache -M 10G

          source build/envsetup.sh && lunch a22-userdebug && \
            m -j2 systemimage 2>&1 | tee $OUTPUT/build_log.txt || true

          # نقل الناتج
          for img in system.img ramdisk.img vendor.img userdata.img; do
            src="$OUT_DIR/target/product/a22/$img"
            if [ -f "$src" ]; then
              cp -v $src $OUTPUT/
              echo "✅ $img"
            else
              echo "⚠️ $img not found"
            fi
          done

          ls -lh $OUTPUT/
          echo "🏁 DONE!"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aosp-a22-output
          path: ${{ github.workspace }}/output/
          retention-days: 7

      - name: tmate SSH Session
        if: failure()
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
