name: AOSP A22 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
            liblz4-tool libssl-dev python3 python3-pip ccache repo
          sudo apt-get clean

      - name: Setup & Run Build
        run: |
          git config --global user.name "Moktar"
          git config --global user.email "moktar@example.com"
          
          (while true; do echo "[$(date '+%H:%M:%S')] Keep alive..."; sleep 120; done) &
          
          sudo mount -o remount,size=100G /tmp 2>/dev/null || true
          
          WORK_DIR="/tmp/aosp_13"
          OUT_DIR="/tmp/out"
          OUTPUT="/tmp/output"
          mkdir -p $WORK_DIR $OUT_DIR $OUTPUT /tmp/ccache /tmp/tmp
          
          cd $WORK_DIR
          
          repo init -u https://android.googlesource.com/platform/manifest -b android-13.0.0_r1 --depth=1 --no-repo-verify
          repo sync -c -j2 --no-tags --no-clone-bundle --force-sync --no-manifest-update || true
          
          # Clean heavy folders
          for d in external/chromium-webview external/noto-fonts cts test kernel/tests tools/treble tools/trebuchet; do
            rm -rf "$WORK_DIR/$d" 2>/dev/null && echo "🗑️ Removed $d"
          done
          
          # Create Device Tree
          DT="$WORK_DIR/device/samsung/a22"
          mkdir -p "$DT"
          
          cat > "$DT/BoardConfig.mk" << 'EOF'
TARGET_ARCH := x86_64
TARGET_ARCH_VARIANT := x86_64
TARGET_CPU_ABI := x86_64
TARGET_CPU_VARIANT := x86_64
TARGET_2ND_ARCH := x86
TARGET_2ND_ARCH_VARIANT := x86_64
TARGET_2ND_CPU_ABI := x86
TARGET_2ND_CPU_VARIANT := x86_64
TARGET_BOARD_PLATFORM := mt6769t
TARGET_BOOTLOADER_BOARD_NAME := a22
BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472
BOARD_USERDATAIMAGE_PARTITION_SIZE := 2147483648
BOARD_CACHEIMAGE_PARTITION_SIZE := 268435456
BOARD_CACHEIMAGE_FILE_SYSTEM_TYPE := ext4
TARGET_USERIMAGES_USE_EXT4 := true
BOARD_AVB_ENABLE := false
BOARD_DEBUGFS_RESTRICTIONS := true
BUILD_BROKEN_DUP_RULES := true
BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES := true
EOF

          cat > "$DT/AndroidProducts.mk" << 'EOF'
PRODUCT_MAKEFILES := $(LOCAL_DIR)/a22.mk
COMMON_LUNCH_CHOICES := a22-userdebug
EOF

          cat > "$DT/vendorsetup.sh" << 'EOF'
add_lunch_combo a22-userdebug
EOF

          cat > "$DT/a22.mk" << 'EOF'
$(call inherit-product, $(SRC_TARGET_DIR)/product/sdk_phone_x86_64.mk)
PRODUCT_NAME := a22
PRODUCT_DEVICE := a22
PRODUCT_BRAND := samsung
PRODUCT_MODEL := SM-A225F
PRODUCT_MANUFACTURER := samsung
PRODUCT_SYSTEM_PROPERTIES += \
    ro.product.model=SM-A225F \
    ro.product.brand=samsung \
    ro.hardware=mt6769t \
    ro.kernel.qemu=0 \
    ro.build.fingerprint=samsung/a22nstur/a22:13/TP1A.220624.014/A225FXXU6DWE3:user/release-keys \
    ro.secure=1 \
    ro.debuggable=0 \
    ro.build.version.release=13 \
    ro.build.version.sdk=33
EOF

          echo "✅ Device Tree Ready!"

          # Build
          export OUT_DIR=$OUT_DIR
          export TMPDIR=/tmp/tmp
          export USE_CCACHE=1
          export CCACHE_DIR=/tmp/ccache
          
          source build/envsetup.sh && lunch a22-userdebug && m -j2 systemimage 2>&1 | tee $OUTPUT/build_log.txt || true

          ls -lh $OUTPUT/

      - name: tmate SSH Session
        uses: mxschmitt/action-tmate@v3
        with:
          sudo: true
