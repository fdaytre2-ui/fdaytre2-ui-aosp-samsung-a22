name: AOSP A22 Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          android: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 lib32ncurses-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig liblz4-tool libssl-dev python3 python3-pip ccache repo \
            openssh-server

      - name: Setup SSH and Ngrok
        run: |
          # Setup SSH server
          sudo systemctl enable ssh
          echo "runner:runner123" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # Install and run ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok

          # Start ngrok - محتاج token من ngrok.com (مجاني)
          ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
          ngrok tcp 22 &
          sleep 5
          curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json; d=json.load(sys.stdin); print('SSH:', d['tunnels'][0]['public_url'].replace('tcp://','').replace(':', ' -p '))"

      - name: Keep Alive
        run: |
          echo "Connected! Use: ssh runner@HOST -p PORT"
          echo "Password: runner123"
          sleep 21600
